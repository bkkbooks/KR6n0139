body:
  text: 五識頌性境現量通三性只為真性不明便生許多妄性眼耳身三二地居誰能少得這個五識徧行別境善十一果然許多妄想中二大八貪嗔癡妄想到這極處五識同依淨色根本來元自清淨九元七八好相隣爭奈被他所擾合三離二觀塵世除非就向五根中看破他根的用處愚者難分識與根却誰曉得這個變相觀空唯後得若能使識不著緣擾還只救得一半果中猶自不詮真佛果位中不說他到極處圓明初發成無漏這個纔是轉識成智三類分身息苦輪將五識還他妙用度生矣奘師五識之頌其大意言五識落于六根門頭而照境處此時比非二量猶未行不過現量分別偶爾現起然非悟人境界便隨緣惑所以纔動念便要走入八萬塵勞網裏徧行別境及二十煩惱等不俟六七八識比非橫行而已知其現量時無數心頭起滅阿誰能免先佛云汝暫舉心塵勞先現是也此時藥以針病如何下手亦就五識中觀他三何以合二何以離且識在根中根在識中識畢竟向甚處起向這裏著得一眼分得清楚這便是悟的消息也若只變想觀空猶被觀門縛定縱有見識亦止是後得智不是根本智到不得妙覺田地只是悟一悟使五識初發時便悟得圓明初發豈但起過二地吾知三類分身的道理即今直下承當而有餘矣性境現量通三性這個三性政是不覺境界善性著落在白業惡性著落在黑業即被因果所束不得自在即非善非惡似乎凝寂然政墮在無知迷悶中無記之病第一可悲者頑空斷見無想三報每每無記者受之故淨智妙圓體自空寂方為究竟若單單空寂便是無記也這三性雖通于現量而現量實因于性境何以說境是性境良以欲觀法界性一切唯心造故淨明移界地于指端月光現清水于室內烏芻瑟摩之徧身是火琉璃光之滿體皆風豈非境是性境乎但未曾向境中徹底悟破則對境而忽生善生惡皆被境轉即嘿嘿對境不知境之落處人在三界中不知三界是甚物未思出離似鱉在甕中竟不知甕是何物縱能癡癡較量總無智慧墮在無記性而已若能如靈雲之覷破桃華洞山之悟影于流水何至被現量作主而通三性乎眼耳身三二地居這五識與五塵合誰人能免此欲界內有五趣雜居地即第一地也其中人有睡眠有飲食有婬欲五識俱全也惟色界初禪曰離生喜樂地即二地也其中天人常多在定中厭此段食故雖有鼻實不著香雖有舌實不著味是五識減臭舌二識也然鼻舌二識實在進之而色界中還有三地所謂三禪也進之而無色界中還有四地所謂四空也以上共九地而初地天人五識猶濁自二地以至九地五識漸清終未至識性無漏也然天人作佛如菜作虀切勿以我輩下劣之凡愚而反輕遊戲天宮之菩薩徧行別境善十一徧行有五以無量劫來迷成業識種子譬如潛淵魚鼓波自涌是為作意引心趣境是名為觸含受不捨是名為受能令前塵影子恍然面前是名為想微細不斷苦心搜索是名為思此乃造善造惡的這一念最為微細處也總從著一境處動念作意便觸境受境想境思境無不至也此個著境徧于八識九地一切時故云徧行也別境有五謂於所樂境希望欲作名曰欲於境決定知其可作不能已也名曰勝解於可作境令心分明記取名曰念於所觀境專注一心名曰定與禪定之定不同也於所作境了然不疑名曰慧與般若之慧不同也總從著一念處這一個念斷然放不過便為欲為勝解為念為定為慧成識性之窠此與境所緣者不同故云別境善十一者上言徧行別境此乃起業之心猶未造作至于善十一則竟成業矣一曰信二曰慚三曰愧四曰無貪五曰無嗔六曰無癡七曰勤八曰安九曰不放逸十曰行捨十一曰不害也五識現量似未造作然業性純熟即偶爾動一念處不動在善邊定動在惡邊動在善則十一之善業凡具五識者必不能免故併及此令悟唯識性者知得善業分數方不離善却不著善則行一善業非行梵天之功積直是轉普賢之悲願耳中二大八貪嗔癡此政是作惡之業也惡業共有二十六根本煩惱有六謂貪嗔癡慢疑不正見從根生枝者隨煩惱有小隨十謂忿恨惱覆誑諂驕害嫉慳無慚無愧此二為中隨不信懈怠放逸昏沉掉舉失正念不正知散亂此八為大隨言小中大者以其作一業止成一業名小如慚必近于愧是一業而兼引二業也名中作一業而能徧諸染心名大是以小隨之業重而反以為小大隨之業小而反以為大蓋因根本纔生枝葉茲惟識所重在念慮上看耳今五識略小隨而止言中二大八者以五識相應獨此親也是對二十六種煩惱中有中二大八併貪嗔癡共一十三種若能悟明識性婆須之善婬無厭足之善嗔調達之善妬以至三車之善貪南泉之善殺佛耶魔耶善耶惡耶其為不思議之境界耶五識同依淨色根根有浮塵根四大色也勝義根潛于四大之中而愚者難見也如眼盲矣而見性在耳塞矣而聞性在名為勝義根故論本來圓明身元空寂所謂究竟涅槃也智變為識識滯為根所以被無明拘碍結色成根而無明識體還栖托其中下凡固不能離浮塵根即中陰身亦有形狀無想天終有壽命推之無色界天人直至四空地者仍有色質蓋能空識業不能空識性即形根有粗重者有輕安者有非有非無能變動者然終不能出九地之界以其帶無明之識而以識蘊根也唯大悟大士其報化二身亦是淨色根却三身一體面目難尋故普眼不見普賢之身文殊不覿迦文之面以至普化之搖鈴騰驤何地達磨之攜履棲泊何天其月穿潭底水無垠乎是謂五識同依淨色根也乃愚者僅認眼如葡萄朵耳如新卷葉為可笑耳九緣七八好相隣五識同依淨根而緣以染之遂覺八識次第各有所緣故頌云眼識九緣生耳識唯從八鼻舌身三七後三五三四若加等無間從頭各增一如眼識具九緣一空喜空隙之空也二明乃日月燈也三根即本根也四境即所見者也五作意即徧行五中之作意也六分別依乃第六識也七染淨依乃第七識也八根本依即第八識也九種子緣謂眼識親生種子也人祇知眼能見耳不知所以見者由諸緣所引而實由六七八識妄見分別之所生故一識迷而識識盡迷一根悟而根根齊悟即此義也迦葉之覷著蓮華雪欽之刺破古栢其緣起無生乎耳識唯從八除去明緣也鼻舌身三七俱除空明二緣也後三五三四言後六七八識有五緣三緣四緣也第六識具五緣一根緣即末那七識二曰境緣即十八界也三曰作意緣即徧行中之作意也四曰根本緣即第八藏識也五曰種子緣即本識親生種子也七識具三緣一曰種子緣即本識親生種子也二曰作意緣徧行中之作意也三曰根境緣即第八藏識為七識之根而由此緣于五塵之境也八識具四緣一曰根緣即末那識也二曰境緣即種子根身器界也三曰作意緣即徧行中之一也四曰種子緣乃第八親生種子也若加等無間從頭各增一者言前念已滅後念復生是謂無間緣九緣加這一緣是九緣者為十緣餘緣例此大意此識性似人之血脈周流于肢體呼吸而諸脈皆轉所以道徧現俱該沙界收攝在一微塵何忍使至寶汩沒緣性間也合三離二觀塵世塵世境也三二根也以根照境說離合如鼻舌身合中取境以合方知眼耳二根離根取境以合壞根故也一喜合一喜離根之應用不同耶識之應用不同耶畢竟以合而觀世之塵耶畢竟以離而觀世之塵耶合離之間可以會取自家屋裏事豈可日用而不知且那律無目而見賢喜無耳而聽殑伽非鼻聞香驕梵無舌知味空神無身覺觸還離耶合耶根耶識耶吾深有望于智者愚者難分識與根根乃色法即第八之相分識乃心法即第八之見分此色心不同也又根能照境識能緣境此根識之用不同也外五塵為八識之踈相分內五根為八識之親相分故第八與五根同是無記性所以五識有隨念分別而無計度分別故常混淆而難辨此根識之性不同也小乘愚法聲聞祇知根識互生不知根之與識各有種子現行謂根為生識之緣則可謂生識則不可以識自有能生之種子故也余謂離根則無以顯識離識則無以托根根識如交蘆各無自性則又似分不得因根有相因相有見此識起于根也因識有根因根有見此根起于識也又似不分不得故楞嚴辨識性非他生非自生非因緣生非無因生畢竟向此生處悟徹根底是謂能分識與根也變相觀空唯後得上明五識之有漏至此轉識成智則能變八識親分之相而使之空亦一分後得智也蓋以頑空則全無智偏空則少有慧所以昔人道二十空門都不着一性如來體自同茲能變相則眼不着于色便將二十煩惱等粗惑已無故非根本智而有後得智後對根本而言也後得智中即有辨才定力而實有修證門頭法見未盡也果中猶自不詮真根本智依心根能親緣真如後得智依色根有分別佛果位中猶隔一塵也人祇知泰師註以安慧師言後得智在前五識因中既成無漏變相緣如矣護法師破之言見相二分猶自徧計性至佛果位自證分方能親緣真如豈能變相緣如乎人即死執因果之分以為見道不能證道也殊不知果熟蒂懸原以究竟處言也悟不徹底豈為究竟亦豈為悟悟者即將唯識性看破十分五識現量至于徧行別境粗細惑業俱由不覺所染能一覺而使千年暗室一燈能破則因即該果海果即徹因源是即果中證真也豈真將心待悟豈真舍悟覓證豈真俟化佛來迎後報易形打坐入定方能入果位得神力耶故證即攝于悟真悟即真證不必執他證位余祇恐世無悟人也圓明初發成無漏六七因中轉五八果上圓今五識起于第八識含藏種子元無世累所謂宿根厚也由是寄於五根門頭能令眼識見相時如迦葉之看破拈華耳根聞聲時如觀音之悟破亡所俱不着修證研摩第向初發處忽爾圓明則即為成所作智同大圓鏡一了百了更無有漏處也三類分身息苦輪化身三類大根者現大身中根者現中身小根者現小身化身攝于報身報身攝于法身但能自見己性即具足一切身試問五識見處其為三量三性其為徧行別境具眾煩惱者畢竟是個什麼非可認為相宗法數之所定也非可認為八識見分之所起也不可認為累劫無明之所現也豈不聞眾生種種幻心皆生如來圓覺妙心中向此直下悟破則是貪嗔起而涅槃現妄想生而佛道成不離殻漏現無量身度生息輪矣六識頌三性三量通三境若人能了心大地無寸土三界輪時易可知畢竟境從心造相應心所五十一都在裏許善惡臨時別配之各從其類性界受三恒轉易念念不停根隨信等總相連一機所轉動身發語獨為最這是魁首引滿能招業力牽便受感報發起初心歡喜地能破煩惱俱生猶自現纏眠法執猶在遠行地後純無漏心花粲發觀察圓明照大千無法不悟奘師言六識大意不過一念明了心似無力量不能如五識之與相實耦也然第六識具五識一定中獨頭意識二散位獨頭意識三夢中獨頭意識四明了意識五亂意識識又具五緣一根緣二境緣三作意緣四根本緣五種子緣以五識五緣本于三量三性三境而無業不受將五十一心所收括殆盡是外五根之所見者俱到六之意頭上其所見者分別未止而七之所執八之所藏者又向六之意頭上分別復來也則胸中似軸轆一般轉轉不停況相續不斷則豈能剎那清淨乎故由三性造三受善受善果之報惡受惡果之報非善非惡平平受無記之報是造引業滿業俱六為之根也除非無想與滅盡睡眠與悶絕意識偶不行然而根終在也必須初獲聖性具證二空到初極喜地而由此具淨戒至離垢地具勝定至發光地生妙慧至焰慧地俗難奪至難勝地住緣起智至現前地離功用越二乘至遠行地則初地俱生我執到此盡破是舉三量分別者反成妙觀察智而覓三受業報了不可得豈非行人大受用境界也要之如何是觀察圓明莫非觀門對治乎是仍法執也莫非使一念不起乎是仍意根卜度也作種種見解搜索意根是謂船橫野渡含秋碧棹入蘆花照雪明三性三量通三境三性三量易解而三境細推之境以性者如功德之淨水隨身之宮殿非性所造乎性境有二一根塵實定果色由八識同分妄業所造二智由根本能緣如亦是此境所謂凡聖同居土也帶質境有二質主也外境質中如茶是水為主之類也帶者言此非有從彼帶過來見是外染者也帶到身上渾身造作如為一個青蚨百千奔馳凡身所着之境俱名帶質故帶質通情本以為有情之所粘滯者也一似帶質即此六識能將前塵境一一明了在方寸是假相在前由第六見分所起是謂似帶質見非真也故云以心緣色似帶質中間相分一頭生一頭生者言六識體本來清淨無物今以妄見所起相分論之似有一個帶質境在裏頭生也二真帶質指七識而言也因七識執八識之見分為我便向五根門頭一一運為出來如貪色運出貪色境質來對六則非似矣故云以心緣心真帶質中間相分兩頭生兩頭生者非單單兩念生也亦非七識八識兩頭現也言念念着在色上自然誠於中形於外一頭生者猶是有頭無尾今則有頭有尾經傳送識無不作用殆盡矣所以云兩頭生也獨影境有二一無質獨影第六緣空花兔角及過未等所變相分二有質獨影即第六緣五根種現是皆托質起其相分然不能親甞不過興見分同種生亦名獨影此言六通三境者五識所見者六意識不作解時得境自相是為性境緣心心所乃帶質境緣無體法是獨影境境為所緣識為能緣各有其體性境以不假名言造作為體能緣者除末那識餘六皆用自心心所為體獨影境以第六見分所變假相分為體能緣即自心心所為體帶質境即變起中間假相分為體能緣者惟六七二識心心所為體故頌云性境不隨心獨影唯從見帶質通情本明此三境庶幾塵消覺淨不但不着境併不着質併不着影方是微塵剎海唯心鏡遍界花開白玉蓮也三界輪時易可知見分既不清染成善惡二性所感將來定受苦樂二報縱迷昧無知政出不得這三界的甕子也定三界之因迷妄有虗空依空立世界妄想凝而成國土知覺出而生眾生若現量既空比非不生則三界心盡是名涅槃故知三界非能拘我也我自造三界其奈之何善被善業所束不得自在惡被惡業所制不得自在縱至非非想處壽盡時仍被劫瞞何不拶碎虗空令前後際斷作出頭天外哉相應心所五十一心本空寂元無處所無如覺性不澄從三量三性中現出徧行五法別境五法善有十一法根本煩惱六法隨煩惱二十法不定四法是五十一心所也餘識不能全具獨大識意根分別時即生許多分別之念是謂別境其分別者必生于九地一切境一切時中之所念是謂徧行分別而善也出不得十一種之善法分別而惡也亦出不得二十六種之惡法縱善而惡也惡而善也或愚迷而無知也或惺惺而有覺也亦出不得不定之四法是總在三性三量中發起亦總在一念不覺時具涵故見宮女之捧足便知其失通聞釧聲之觸耳便知其破戒因便知其該果本便知其攝末所以意根未悟豈可輕易動念先佛云切莫信汝意汝意不可信謂此故也根本煩惱六者謂貪嗔癡慢疑不正見此六乃二種我法之根本斷慧命者唯此為甚不定四者謂悔眠尋伺悔不定者如作惡之人改悔為善眠則心極暗昧此非善惡名不定也尋者必作善之心意言籌量粗轉為尋入細為伺如讚菩薩初尋後伺方得妙辭也如刁訟之人亦由尋入伺方得成算此二法或善或惡蓋不定也善惡臨時別配之既具業種於心所自然逢緣便發每見吉人心善則語亦善視亦善種種俱善惡人三種俱不善是善惡諸法各隨人自己配合也若是有智主人功德天黑暗女二俱不受性界受三恒轉易受雖有三其實有五也謂苦受樂受憂受喜受捨受是也逼悅身曰苦樂逼悅心曰憂喜憂喜苦樂不行時名為捨受今第六識中或由黑業而恒轉於欲界招苦受由白業恒轉于色無色界招樂受蓋有身苦固為苦即娛樂之天人終歸五衰相現豈真為樂也有心憂固為憂即福盡之梵輔自然煩惱頓起豈真為喜也況升沉速轉芥子虗空皆我捨命處是脫骨過須彌山猶未盡其恒轉之數也必念起念滅不離圓寂世出世間總是涅槃其庶幾不為舟行岸移也根隨信等總相連根謂根本煩惱也隨謂隨煩惱也信謂十一中之信也等謂徧行別境不定等也總相連者謂身雖受報之不同未免改形易相而此業識在五十一心所者至今不換或善而善法仍現或惡而惡法仍現所謂習慣成自然不覺不知墮入魔網中也動身發語獨為最論云由外發身語表內心所思譬如潛淵魚鼓波而自湧此識有三思一審慮思二決定思三動發勝思餘識所無故最勝也然此發語離舌不發舌又不能自發聲性究竟向甚處生也故因識可以識性因聲可以悟道如空潭之月撈摭方知也引滿能招業力牽引者能牽引業也滿者能完滿業也有以一業招一果者有以一業引多果者報有總別二果總者如此界總得人身別者如人身貴賤不同也夫以六識三量而現五十一心所無論下劣凡夫被緣埋沒學人猶墮結業菩薩尚隔蘊界真所謂定業難逃也除非大悟者向境緣逆順中以般若消之則煩惱菩提結業解脫無二般也發起初心歡喜地俱生猶自現纏眠纏目現行眠目種子以六識見分與煩惱打作一團雖到得初心歡喜地而俱生我執俱生法執猶伏在第六意根中如眼珠之未離眶也到得所知障空俱生猶在今人通身習氣自稱悟道豈非狂禪乎遠行地後純無漏觀察圓明照大千俱生我法二執乃七識所執者七識無力斷惑亦仗六識以雙空觀破諸執也茲以悟明見分歷離垢發光焰慧難勝現前至此遠行使所證不淺則俱生有漏永伏不起相應心所轉為妙觀察智能說法利生具大辨才頭頭上顯物物上明其在此乎今人墮在無記中得塵勞暫息自云意根清淨豈知偷心未死繫駒伏鼠死水呆禪何足云也七識頌帶質有覆通情本捏恠多般隨緣執我量為非聽人穿鼻八大徧行別境慧諸業俱生貪癡我見慢相隨四惑尤固恒審思量我相隨果自俱生我執有情日夜鎮昏迷安得不墮生死四惑八大相應起業性不停六轉呼為染淨依牽連六根極喜初心平等性不是帶質有覆無功用行我恒摧不是恒審思量如來現起他受用傳送俱妙十地菩薩所被業法雲普覆奘師大意言此七識名為末那以其思量為性相又名為傳送以其運動為作用又名為執持以其著我為堅固又名染淨依以其六識為依仗所以境非性影但帶質有覆所作所用每為情本之癡量非比現第隨緣無記通根通識俱為非量之計也故煩惱有二十六法而此識惟以現運染穢為性故與八大相應不信懈怠放逸與有覆相合也無堪任性昏沉也多囂動掉舉也多流蕩散亂也能起煩惱現前失念不正知也又與徧行之作意觸愛想思五法相應也又與別境中之慧相應以慧即我見也以此識任運合境無所希望故揀欲此識緣所定事故揀勝解此識恒緣現所受境無所記憶故揀念此識任運剎那別緣既不專一故揀定我癡我見我慢我愛名為四惑與此相應忿等十隨行相粗動此識審細故非彼俱中隨二者唯是不善此無記故非彼相應善十一是淨故此識染污非此識俱此識具三緣具種子緣作意緣根境緣故以帶質為境思量為性我執為本則有情日夜不墮昏迷乎且以有藏識得有末那有末那故為六之轉識所依有六之轉識故五之現識得依之行也是七之通根境緣依彼轉緣彼也所以六轉呼為染淨依見七雖有我執實無我性可以通六通五可以隨染隨淨惟悟之者善用之也苟六識能悟入我法俱除之雙空觀是於初地初心轉成無漏者也此時證得平等智所作所為無一法墮于世諦是帶質有覆隨緣執我者俱消釋于平等智矣則豈不能說大法利羣機哉帶質有覆通情本帶質何以通情本也試觀身之着色境者念念在茲不是心為葢覆而通情本乎故無論此界凡夫身為色牽地居二天則形交𦦨摩則勾抱兜率則執手變化則對笑他化則相視皆是帶質通情本也然此七識之著情本者直是帶八識愛根之本質而生起者也故葢覆真性實已彌甚一說因謂以心緣心真帶質中間相分兩頭生一是七識所轉一是八識所蘊故云兩頭生也隨緣執我量為非現比二量恒審中亦所起者也然五根識之所引者七識為之任運內六與八識之造者七識又為之傳送則隨緣執我者非量為多矣如人呌我本名我即應之即應之時口耳身俱動非傳送識乎呼我我應非我執乎因呼即應非依彼轉緣彼乎然此時不著比量計較非非量乎由呼而應非我作主豈現量乎八大徧行別境慧貪癡我見慢相隨慧屬別境中之慧貪癡為根本煩惱之二法我癡我見我慢我愛名四惑又名四煩惱據此識祇管執持傳送屬非量無記所攝因何具足諸惑葢以此識具恒審思量能為作意故亦能著境緣而為徧行別境淨法與惡法無不俱造不比五識各屬一根而不能俱轉不比六識止能空空分別而不能親甞境界也是思惟甚細力量甚大矣恒審思量我相隨有情日夜鎮昏迷前五識由現量緣境不常故非恒由不執我故非審六識審恒亦有間斷唯七識恒常審察第八識之見分為我而相應隨從也如靜坐時五識現境不打起而無故靜中忽動一境緣者此由八識所藏所現之影子也乃第七識執之而常想非恒審乎即以其想者為散亂為掉舉不連累六根乎故六反依此為主人也凡此皆以其我相堅固故恒常審察即其思量思量即其我執我執即七識妄見之識性也乃迷者不悟認執我之識神以為自性真日用沉迷無剎那之慧根矣四惑八大相應起六轉呼為染淨依夫此七識具足四惑八大是真染污識也然而迷悟由人苟一念妙悟使藏識澄清則七識之思量執持者俱淨而不染併六識依此淨而不染也是七識終無自性任悟者一轉之矣極喜初心平等性無功用行我恒摧每每七識與我執俱生執有我而與無我差別執有法而與忘法各殊是不平等也今從初地發心時不假思惟不着覺觀祇將末那之意根一悟破我直忘功用盡透法執是以空合空以水灌水覓徧行別境一切心所了不可得豈非平等智哉如來現起他受用十地菩薩所被機我七識之所運轉既通身是平等智則不惟利己還能利他能令見者聞者俱得受用十地菩薩根性上品者亦受我所被之機矣如佛現百丈身坐百葉蓮華為初地說施度現千丈身坐千葉蓮華為二地說戒度是也然縮大為小化多為一則即今一微塵皆為寶王轉大法輪矣是時時處處俱為十地所被之機也八識頌性唯無覆五徧行好個記性界地隨他業力生又却無記二乘不了因迷執不悟八識由此能興論主諍具眼方知浩浩三藏不可窮流注生滅淵深七浪境為風無盡因緣受薰持種根身器身世由他去後來先作主翁這是生死不動地前纔捨藏一悟方了金剛道後異熟空悟後境界大圓無垢同時發還他無垢普照十方塵剎中纔了唯識奘師大意言八識之性能含藏過去未來緣謝影子豈是葢覆遮掩得底且本無善惡性又屬無記無奈具四緣能為徧行作意遂以一念之妄見者蘊而為本識之種子故三界九地性本非有茲以識造境還以境眩識識境相因牢不可破皆此識業力成之耳乃二乘不信有八識因致大乘論主之諍豈知論八識之體用一為能藏之識以其能含藏善惡種子二為所藏之識以其受現行習氣所薰三為執藏之識能執七識為我能執四大不壞具此三藏以御根境之緣是八識為淵七識為浪而境風吹浪則五六七成風浪者淵豈得清靜乎境風者眾生之妄見也若妄見不生則浪息淵平八識有何過也唯境風吹浪則淵即為波波波無盡然則八識受薰持種而致受根器之界生死去來之報非八識誰為之乎大悟之人從初地至不動地其有漏之習氣看破已透從作意時便消釋俱盡則念念入金剛之定藏識之捨異熟之空由此眼中無色識識中無色眼眼識俱清淨是名無生義由此耳鼻身意一一俱轉打作一個照前照後大圓無垢之鏡則眼政可以見耳政可以聞鼻政可以嗅舌政可以甞身政可以觸意政可以分別末那政可以任用賴耶政可以攝受以其為成所作智也見何曾是眼聞何曾是耳嗅何曾是鼻嘗何曾是舌觸何曾是身分別何曾是意任用何曾是末那攝受何曾是賴耶以其為妙觀察智也即見非見非不見即聞非聞非不聞即嗅非嗅非不嗅即嘗非嘗非不嘗即觸非觸非不觸即分別非分別非不分別即任用非任用非不任用即攝受非攝受非不攝受兩頭坐斷是平等智也即三智渾淪脫化絕無心迹收來總一無垢圓鏡而已是悟四智于一心了萬法于八識者之第一義也性唯無覆五徧行界地隨他業力生原此識性實無善惡不過無記無覆者而已所以緣非帶質獨影而染淨諸法俱不相應也無奈能作意引心趨境則五徧行之中無垢不藏所以此識為總報主趣生體而三界九地俱由他業力生耳如乾土不能相握自成一聚由水膠等和彼乾土方成無記之法不能成器聚由善惡業力方成界地也二乘不了因迷執由此能興論主諍解深密經云阿陀那識甚深細一切種子如瀑流我與凡愚不開演恐彼分別執為我阿陀那唐言執持以第八能持種子不壞亦名執持也小乘堅執六識不信八識為因緣用又不信八識為流轉還滅作依持用耳由此大乘論主以十證頌辨之十證頌曰持種異熟心趣生有受識生死緣依食滅定心染淨無始時來以此識與一切法為依止故與現行法又為依止此證持種心也又云有善惡心累劫薰習名為異熟心招善惡業感若無此識彼異熱心不應有故此釋異熟心也有情流轉五趣四生若無此識彼趣生體不應有故以前五識業所感者不徧趣生以無色界中全無此故意識業感雖徧趣生而不恒有唯異熟心及彼心所是政趣生也又契經云有色根身是有執受若無此識彼能執受不應有故此能受心唯異熟心轉識無如是義此釋受也契經云壽煖識三更互依持得相續住以轉識如聲風等無恒持用惟異熟有恒持用故立為持壽煖識此釋識也契經云諸有情類命終必住散心非無心定且生死時身心惛昧如睡無夢極悶絕時明了意識必不現前六種轉識行相所緣必不可知是散去有心名生死心別有一類微細意識行相所緣俱不可斷應知即是第八識又將死時由善惡業下上身分冷觸漸起若無此識彼事不成轉識不能執受身故此證第八識心為生死也又說識緣名色名色緣識如是二法展轉相依譬如束蘆俱時而轉彼諸轉識無力恒時執持名色恒與名色為緣緣者此第八識此釋緣也契經云一切有情皆依食住轉識不能執持身命唯其熟識是勝食性此釋依食也契經說住滅定者身語心行無不皆滅而壽煖猶在根不變壞識不離身由斯理趣住滅定者決定有此流注八識無想等位類此可知此釋滅定心也契經說心雜染故有情雜染心清淨故有情清淨若無此識染淨心不應有故謂染淨法因心而生依心而住也此識心淨染也大意這一念不悟便為染淨種子種子或染或淨差別不同而念念常不斷即名異熟異熟必定趣生落于界地所攝即便有執受不能離身相也而所以致受必定以地水火風搏成息氣之呼吸名持壽煖因所以有生相死相也當其投胎定緣名色如覩日光而生天見婬火而生人名色緣識識緣名色兩不離也及其受根決不能離食是始終成就根緣者俱八識為之首尾也所以念念不能離此藏識即住滅定而心之在染淨者根何能空識何以除也小乘悟不及此豈能全證涅槃乎浩浩三藏不可窮執種義為執藏受薰義為所藏持種義為能藏頌云諸法於識藏識與法亦爾更互為果性亦常為因性此因緣法之無窮者也然佛法無多子久遠難得人直下會取直下具足萬古碧潭摸新月回頭還在舊樓間淵深七浪境為風浪波元相依境風所擊則多波生五六七皆依八識為見分所迷則染淨法從此無盡則一識迷而識識之種子俱不淨矣何異七浪為境風所擊也一說八識現種如波境等四緣如風若四緣之風恒擊第八現水則常起八識現種之波矣如第七識緣于藏識即第七識為境緣之風觸動八識現行之波浪也若以前七識之現行熏此藏識即此現行為境界風觸動藏識種子生起現行之波浪也波浪無盡故云不可窮若悟此八識之性則為華藏界帝網珠矣受薰持種根身器第八識為總報主能持諸法漏無漏種所以持種能受前七識所薰以其具四性故一堅住性二無記性三可熏性四與能熏和合根身器界原為八識所變相分之境故以心緣心即此根界是其所熏所持者也若以淨眼視之則此根不啻如唾餘所以道見聞如夢幻三界若空華去後來先作主公人將入胎時此第八識先來然後前七種識次第生來前七種識所造善惡業因總于八識受其果報如偈云頂聖眼生天人心惡鬼腹旁生膝盖離地獄脚板出此八識後去之象從染淨而分也昔人云纔出胞胎又入胎聖人觀此動悲哀幻身究竟無香潔打破畫瓶歸去來旨哉言乎不動地前纔捨藏藏即阿賴耶茲八識以清淨等覺歷煖地頂地忍地世第一地歡喜地離垢地燄慧地難勝地遠行地歷諸地悟真如心名不動地則諸漏俱盡破諸結使現量比量帶質獨影俱空則內生之我執不行即證第九白淨識而藏纔捨也然必執此階級方破藏乎奘師言前五識曰圓明初發成無漏六云發起初心歡喜地七云極喜初心平等性八云大圓無垢同時發曰初心曰同時是大乘人一念悟入超過等覺位之階級也豈真許多淘汰所致乎金剛道後異熟空異熟者是善惡所引果故或變異而熟或異時而熟異類而熟名異熟性也如本來共是佛我却與佛不同是業識純熟也業至熟甘作眾生不甘作佛所以八種子一段貪痴千佛難救耳惟自肯承當能信本分事純以金剛智破我破法則煩惱一除併忘鑽火將淨法執者亦與之空矣大圓無垢同時發普照十方塵剎中捨藏空異熟則五識與八識剎那成清淨覺更不待第二時矣良以現識轉識藏識即一而三即三而一故為如意珠即念宛然似神通藏絕無隔礙所以有時以現而引起藏有時以藏引起轉有時以轉引起現與藏者是識識各有種子而能俱現是識識各共一種子而能互現也余故謂體同用別即此義也然根即屬相分識即屬見分由見分而相生由相分而見生見相無根同于妄想妄想本空原是淨覺所以明不離暗識不離性亘古亘今人人具足無垢鏡也唯識頌云現前立少物謂是唯識性以有所得故非實住唯識不透頂說破乎唯識不明反認是相宗為自性設障豈不可深悲耶據識論眼前立不得一物則以多知漢說心說性何含血噴人也當知識識皆有悟門密以金針引我合筍如所謂徧行別境併善十一煩惱二十六者放眼看來畢竟是個什麼不得以法塵影子便認作自己茶飯也如以為胸中似有一物相似畢竟捨不得亦須放開眼看他體段畢竟存躲在甚處一一看破真不值我一笑矣故余謂百億塵勞及微細命根何殊網中吹氣匣裏藏聲乃愚者執等妙二覺以修汰死法束制行人縱令有悟不縛手縛脚耶雖空心不空境破執不破法終為醍醐毒藥只是秉金剛劍打頭在千佛頂上截取其頭是與慶喜尊出冤氣矣不然多打葛藤定為奘大師所唾棄耳
